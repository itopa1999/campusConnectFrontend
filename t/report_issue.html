<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CampusConnect UI · Contact & Report</title>
  <!-- Bootstrap 5 + FontAwesome + Google Fonts + AOS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="icon" type="image/jpeg" href="/assets/img/icon.jpg">
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    .contact-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .contact-card {
      background: white;
      border-radius: 2rem;
      border: 1px solid var(--card-border, #eef2f0);
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 580px;
      padding: 2rem 1.8rem;
    }
    .form-control, .form-select {
      border-radius: 28px;
      border: 1px solid var(--card-border, #eef2f0);
      background: white;
      padding: 0.85rem 1.2rem;
      font-size: 0.95rem;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--accent, #2c7a5e);
      box-shadow: 0 0 0 3px rgba(44, 122, 94, 0.1);
      outline: none;
    }
    textarea.form-control {
      border-radius: 24px;
      resize: vertical;
    }
    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: var(--accent, #2c7a5e);
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }
    .back-link:hover {
      color: var(--accent-dark, #1f5e48);
      transform: translateX(-4px);
    }
    @media (max-width: 480px) {
      .contact-card {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div id="particles-js"></div>
<div class="contact-wrapper">
  <div class="contact-card" data-aos="fade-up" data-aos-duration="800">
    <!-- handshake icon -->
    <div class="text-center mb-3" data-aos="fade-right" data-aos-delay="100">
      <img src="/assets/img/icon.jpg" alt="CampusConnect UI" height="70" style="border-radius: 50px;">
      <h2 class="mt-3 fw-semibold" style="color: var(--accent, #2c7a5e);">Contact & report issue</h2>
      <p class="text-muted small mt-2">Have a problem, suspicious listing, or feedback? Let us know.</p>
    </div>

    <form id="reportForm">
      <!-- Name -->
      <div class="mb-3">
        <label class="form-label text-muted fw-semibold small">Full name</label>
        <input type="text" class="form-control" id="fullName" placeholder="e.g., Tolani Adeleke" required>
      </div>
      <!-- Email -->
      <div class="mb-3">
        <label class="form-label text-muted fw-semibold small">Email address (UI email)</label>
        <input type="email" class="form-control" id="email" placeholder="you@ui.edu.ng" required>
      </div>
      <!-- Issue type -->
      <div class="mb-3">
        <label class="form-label text-muted fw-semibold small">Issue type</label>
        <select class="form-select" id="issueType" required>
          <option value="" disabled selected>Select one</option>
          <option value="report_listing">🚩 Report a listing</option>
          <option value="report_user">👤 Report a user</option>
          <option value="bug">🐛 Technical bug / error</option>
          <option value="question">❓ Question or feature request</option>
          <option value="other">📝 Other</option>
        </select>
      </div>
      <!-- Listing URL (conditional, but we keep visible for simplicity) -->
      <div class="mb-3" id="urlField">
        <label class="form-label text-muted fw-semibold small">Listing URL (if reporting a specific item)</label>
        <input type="url" class="form-control" id="listingUrl" placeholder="https://campusconnect.ui/listings/123">
      </div>
      <!-- Message -->
      <div class="mb-3">
        <label class="form-label text-muted fw-semibold small">Message / details</label>
        <textarea class="form-control" id="message" rows="4" placeholder="Describe the issue or your message here..." required></textarea>
      </div>
      <!-- Optional attachment note -->
      <div class="mb-3 form-text text-muted small">
        <i class="fas fa-paperclip me-1"></i> Screenshots? Please email them separately to <strong>support@campusconnect.ui</strong> after submitting this form.
      </div>
      <!-- Added missing ID -->
      <button type="submit" class="btn btn-primary-custom w-100" id="submitReportBtn">Submit report</button>
    </form>

    <div class="text-center mt-3">
      <a href="#" class="back-link" onclick="history.back(); return false;">← Back to CampusConnect</a>
    </div>
  </div>
</div>

<!-- Toast Notification Container -->
<div id="toast-container" class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
  // ========== Report Issue Simulation (matches auth.js format) ==========
  const reportForm = document.getElementById('reportForm');
  const submitBtn = document.getElementById('submitReportBtn');
  const originalBtnText = submitBtn ? submitBtn.innerText : 'Submit report';

  reportForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    // Basic validation
    const name = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const issueType = document.getElementById('issueType').value;
    const message = document.getElementById('message').value.trim();

    if (!name || !email || !issueType || !message) {
      showToast('Please fill in all required fields.', 'error');
      return;
    }

    // Simulate backend request
    setButtonLoading(submitBtn, true, originalBtnText);
    try {
      await new Promise(resolve => setTimeout(resolve, 5000)); // 5 sec delay
      showToast(`✅ Thank you, ${name}. Your report has been sent. We'll review it within 48 hours.`, 'success');
      // Reset the entire form after successful submission
      reportForm.reset();
      // Optionally clear the listing URL field (already reset)
    } catch (err) {
      showToast('Network error. Please try again.', 'error');
    } finally {
      setButtonLoading(submitBtn, false, originalBtnText);
    }
  });
</script>
</body>
</html>
