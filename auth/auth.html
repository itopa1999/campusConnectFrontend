<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Join CampusConnect UI · Sign in or create account</title>
  <!-- Bootstrap 5 + Icons + Google Fonts (same as main page) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/jpeg" href="../assets/img/icon.jpg">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
  <style>
    
  </style>
</head>
<body>
<div id="particles-js"></div>
<div class="auth-wrapper">
  <div class="auth-card" data-aos="fade-up" data-aos-duration="800">
    <div class="text-center mb-3" data-aos="fade-right" data-aos-delay="100">
      <img src="/assets/img/icon.jpg" alt="CampusConnect UI" height="70" style="border-radius: 50px;">
      <h4 class="mt-2 mb-3 fw-semibold" style="color: var(--accent);">CampusConnect UI</h4>
    </div>
    <!-- Toggle tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-form="login">Sign in</button>
      <button class="auth-tab" data-form="signup">Create account</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form" class="auth-form active-form">
      <form id="loginFormElement">
        <div class="mb-3">
          <label class="form-label text-muted small fw-semibold">Email address (UI email)</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="you@ui.edu.ng" required>
        </div>
        <div class="mb-3">
          <label class="form-label text-muted small fw-semibold">Password</label>
          <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberCheck" style="border-radius: 6px;">
            <label class="form-check-label remember-check" for="rememberCheck">Remember me</label>
          </div>
          <a href="forget_password.html" class="forgot-link text-decoration-none">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100" id="loginBtn">Sign in →</button>
      </form>
      <div class="text-center mt-4">
        <p class="small text-muted">Protected by UI email verification | <a style="color: var(--accent);" href="/index.html">Home</a></p>
      </div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signup-form" class="auth-form">
      <form id="signupFormElement">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label text-muted small fw-semibold">First name</label>
            <input type="text" class="form-control" id="firstName" placeholder="first_name" required>
          </div>
          <div class="col-md-6">
            <label class="form-label text-muted small fw-semibold">Last name</label>
            <input type="text" class="form-control" id="lastName" placeholder="last_name" required>
          </div>
        </div>
        <div class="mt-3">
          <label class="form-label text-muted small fw-semibold">Email address (UI or stu.ui)</label>
          <input type="email" class="form-control" id="signupEmail" placeholder="you@ui.edu.ng" required>
        </div>
        <div class="mt-3">
          <label class="form-label text-muted small fw-semibold">Phone number (<i class="fab fa-whatsapp me-1"></i>Whatsapp)</label>
          <input type="tel" class="form-control" id="phoneNumber" placeholder="0803 123 4567" required>
        </div>
        <div class="mt-3">
          <label class="form-label text-muted small fw-semibold">Password</label>
          <input type="password" class="form-control" id="signupPassword" placeholder="Create a strong password" required>
        </div>
        <div class="form-check mt-3 mb-4">
          <input class="form-check-input" type="checkbox" id="termsCheck" style="border-radius: 6px;">
          <label class="form-check-label small text-muted" for="termsCheck">
            I agree to the <a href="/t/terms.html" class="text-decoration-none" style="color: var(--accent);">Terms of Service</a> and <a href="/t/privacy.html" class="text-decoration-none" style="color: var(--accent);">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100" id="signupBtn">Create free account →</button>
      </form>
      <div class="text-center mt-4">
        <p class="small text-muted">Only current UI students can join | <a style="color: var(--accent);" href="/index.html">Home</a></p>
      </div>
    </div>
  </div>
</div>

<!-- Toast Notification Container -->
<div id="toast-container" class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="/assets/js/main.js"></script>
<script src="/assets/js/auth/auth.js"></script>
<script>


</script>
</body>
</html>
