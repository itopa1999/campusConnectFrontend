<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CampusConnect UI · Forgot Password</title>
  <!-- Bootstrap 5 + FontAwesome + Google Fonts + AOS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/forget_password.css">
</head>
<body>
<div id="particles-js"></div>
<div class="forgot-wrapper">
  <div class="forgot-card" data-aos="fade-up" data-aos-duration="800">
    <div class="text-center mb-3" data-aos="fade-right" data-aos-delay="100">
      <i class="fas fa-handshake fa-3x" style="color: var(--accent, #2c7a5e); background: var(--accent-light, #eaf7f0); padding: 14px; border-radius: 60px;"></i>
      <h2 class="mt-3 fw-semibold" style="color: var(--accent, #2c7a5e);">Reset password</h2>
      <p class="text-muted small mt-2">Enter your UI email address and we'll send you a link to reset your password.</p>
    </div>

    <form id="forgotFormElement">
      <div class="mb-4">
        <label class="form-label text-muted fw-semibold small">Email address (UI or stu.ui)</label>
        <input type="email" class="form-control" id="resetEmail" placeholder="you@ui.edu.ng" required>
      </div>
      <button type="submit" class="btn btn-primary-custom w-100" id="sendLinkBtn">Send link</button>
    </form>

    <div class="text-center mt-3">
      <a href="#" class="back-link" onclick="history.back(); return false;">← Back to sign in</a>
    </div>
  </div>
</div>

<!-- Toast Notification Container -->
<div id="toast-container" class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="/assets/js/main.js"></script>
<script>
  // ========== Forgot Password with Real Backend ==========
const forgotForm = document.getElementById('forgotFormElement');
const resetBtn = document.getElementById('sendLinkBtn');
const resetOriginalText = 'Send link';
const FORGOT_PASSWORD_URL = `${AUTH_URL}forgot-password`;

forgotForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('resetEmail').value.trim();

  if (!email) {
    showToast('Please enter your UI email address.', 'error');
    return;
  }

  // Optional: basic UI domain hint (backend will validate anyway)
  // if (!email.endsWith('@ui.edu.ng') && !email.endsWith('@stu.ui.edu.ng')) {
  //   showToast('Please use a valid @ui.edu.ng or @stu.ui.edu.ng email.', 'error');
  //   return;
  // }

  setButtonLoading(resetBtn, true, resetOriginalText);

  try {
    const response = await fetch(FORGOT_PASSWORD_URL, {
      method: 'POST',
      headers: {
        'accept': 'application/json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ email })
    });

    const result = await response.json();

    if (response.ok && result.is_success === true) {
      showToast(result.message || `Password reset link sent to ${email}. Check your inbox.`, 'success');
      
      forgotForm.reset();
      
      // Redirect to login page after 1.5 seconds
      setTimeout(() => {
        window.location.href = '/auth/auth.html';
      }, 1500);
    } else {
      showToast(result.message || 'Failed to send reset link. Please try again.', 'error');
    }
  } catch (err) {
    console.error('Forgot password error:', err);
    showToast('Network error. Could not connect to server.', 'error');
  } finally {
    setButtonLoading(resetBtn, false, resetOriginalText);
  }
});
</script>
</body>
</html>
