<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CampusConnect UI · 403 Forbidden</title>
  <!-- Bootstrap + Icons + Fonts + AOS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="icon" type="image/jpeg" href="../assets/img/icon.jpg">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/modal.css">
  <style>
    /* ─── Minimal custom styles ─── */
    .error-icon {
      font-size: 4.5rem;
      color: #dc3545;
      background: rgba(220, 53, 69, 0.08);
      width: 120px;
      height: 120px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin-bottom: 1.5rem;
    }
    .error-card {
      max-width: 540px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .error-card h1 {
      font-weight: 800;
      font-size: 2.5rem;
      color: #1e2a2c;
    }
    .error-card p {
      color: #5a6e6f;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }
    .error-actions .btn {
      min-width: 140px;
      border-radius: 40px;
      padding: 0.6rem 1.5rem;
      font-weight: 600;
    }
    .error-actions .btn + .btn {
      margin-left: 0.75rem;
    }
    @media (max-width: 576px) {
      .error-card {
        padding: 1.5rem 1rem;
      }
      .error-card h1 { font-size: 2rem; }
      .error-icon { width: 90px; height: 90px; font-size: 3.5rem; }
      .error-actions .btn {
        display: block;
        width: 100%;
        margin-bottom: 0.75rem;
      }
      .error-actions .btn + .btn {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
<div id="particles-js"></div>

<div id="nav-placeholder"></div>
<div id="breadcrumb-placeholder"></div>

<main class="pt-2">
  <div class="container py-5">
    <div class="error-card dashboard-card shadow-sm rounded-4 p-4 p-md-5" data-aos="fade-up">
      <div class="error-icon">
        <i class="fas fa-ban"></i>
      </div>
      <h1>403 Forbidden</h1>
      <p>
        You don’t have permission to access this page.<br>
        If you believe this is a mistake, please contact support.
      </p>
      <div class="error-actions d-flex flex-wrap justify-content-center gap-2">
        <button class="btn btn-outline-custom" onclick="history.back()">
          <i class="fas fa-arrow-left me-2"></i> Go Back
        </button>
        <a href="main.html" class="btn btn-primary-custom">
          <i class="fas fa-home me-2"></i> Dashboard
        </a>
      </div>
      <hr class="my-4">
      <p class="small text-muted">
        If you need assistance, visit our <a href="../t/report-issue.html" class="text-accent">support centre</a>.
      </p>
    </div>
  </div>
</main>

<!-- Mobile bottom nav -->
<div class="dashboard-mobile-actions d-md-none">
  <a href="main.html" class="action-link" data-bs-toggle="tooltip" title="Go home"><i class="fas fa-home"></i><span>Home</span></a>
  <a href="create-listing.html" class="action-link" data-bs-toggle="tooltip" title="Post listing"><i class="fas fa-plus-circle"></i><span>Post</span></a>
  <a href="listings.html" class="action-link" data-bs-toggle="tooltip" title="View listings"><i class="fas fa-list"></i><span>Listings</span></a>
</div>

<!-- Modals (not used but kept for consistency) -->
<div id="formModal" class="modal-overlay" style="display: none;">
  <div class="modal-container">
    <div class="modal-header">
      <h3 id="formModalTitle">Form Title</h3>
      <button class="modal-close" id="closeFormModalBtn" data-bs-toggle="tooltip" title="Close form">&times;</button>
    </div>
    <div class="modal-body" id="formModalBody"></div>
    <div class="modal-footer" id="formModalFooter"></div>
  </div>
</div>
<div id="confirmModal" class="modal-overlay" style="display: none;">
  <div class="modal-container confirm-modal-container">
    <div class="modal-header">
      <h3 id="confirmModalTitle">Confirm Action</h3>
      <button class="modal-close" id="closeConfirmModalBtn" data-bs-toggle="tooltip" title="Close dialog">&times;</button>
    </div>
    <div class="modal-body" id="confirmModalBody">
      <p id="confirmMessage"></p>
    </div>
    <div class="modal-footer" id="confirmModalFooter"></div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<button class="scroll-top-btn" data-scroll-top data-bs-toggle="tooltip" title="Scroll to top"><i class="fas fa-arrow-up"></i></button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="../assets/js/main.js"></script>
<script>
  if (typeof isAuthenticated === 'function') {
    isAuthenticated();
  }

  if (typeof injectBreadcrumb === 'function') {
    injectBreadcrumb('403 Forbidden');
  }
</script>
</body>
</html>
